<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recipe Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .recipe-output {
            display: none;
            white-space: pre-wrap;
            line-height: 1.6;
            color: #333;
        }
        
        .recipe-output.active {
            display: block;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            display: none;
        }
        
        .loading.active {
            display: block;
        }
        
        .save-btn {
            background: #10b981;
            margin-top: 15px;
            display: none;
        }
        
        .save-btn.active {
            display: block;
        }
        
        .favorites {
            margin-top: 30px;
        }
        
        .favorite-item {
            background: #f9fafb;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .favorite-item:hover {
            background: #f3f4f6;
        }
        
        .favorite-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .favorite-date {
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍳 AI Recipe Generator</h1>
        
        <div class="card">
            <div class="input-group">
                <label for="ingredients">What ingredients do you have?</label>
                <input type="text" id="ingredients" placeholder="e.g., chicken, tomatoes, garlic, pasta">
            </div>
            
            <div class="input-group">
                <label for="preferences">Any preferences or dietary restrictions?</label>
                <textarea id="preferences" placeholder="e.g., vegetarian, gluten-free, spicy, Italian style"></textarea>
            </div>
            
            <button id="generateBtn" onclick="generateRecipe()">Generate Recipe</button>
            
            <div class="loading" id="loading">Generating your delicious recipe...</div>
            
            <div id="recipeOutput" class="recipe-output"></div>
            
            <button class="save-btn" id="saveBtn" onclick="saveRecipe()">💾 Save to Favorites</button>
        </div>
        
        <div class="card favorites">
            <h2 style="margin-bottom: 20px; color: #333;">Your Favorite Recipes</h2>
            <div id="favoritesList">
                <p style="color: #6b7280;">No saved recipes yet. Generate and save your first recipe!</p>
            </div>
        </div>
    </div>
    
    <script>
        let currentRecipe = '';
        
        async function generateRecipe() {
            const ingredients = document.getElementById('ingredients').value;
            const preferences = document.getElementById('preferences').value;
            
            if (!ingredients.trim()) {
                alert('Please enter some ingredients!');
                return;
            }
            
            const generateBtn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const output = document.getElementById('recipeOutput');
            const saveBtn = document.getElementById('saveBtn');
            
            generateBtn.disabled = true;
            loading.classList.add('active');
            output.classList.remove('active');
            saveBtn.classList.remove('active');
            
            try {
                const response = await fetch('/api/generate-recipe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ingredients, preferences })
                });
                
                const data = await response.json();
                
                if (data.recipe) {
                    currentRecipe = data.recipe;
                    output.textContent = data.recipe;
                    output.classList.add('active');
                    saveBtn.classList.add('active');
                } else {
                    output.textContent = 'Error generating recipe. Please try again.';
                    output.classList.add('active');
                }
            } catch (error) {
                output.textContent = 'Error: ' + error.message;
                output.classList.add('active');
            } finally {
                loading.classList.remove('active');
                generateBtn.disabled = false;
            }
        }
        
        async function saveRecipe() {
            if (!currentRecipe) return;
            
            const ingredients = document.getElementById('ingredients').value;
            const saveBtn = document.getElementById('saveBtn');
            
            saveBtn.disabled = true;
            
            try {
                const response = await fetch('/api/save-recipe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        recipe: currentRecipe,
                        ingredients: ingredients
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Recipe saved to favorites!');
                    loadFavorites();
                }
            } catch (error) {
                alert('Error saving recipe: ' + error.message);
            } finally {
                saveBtn.disabled = false;
            }
        }
        
        async function loadFavorites() {
            try {
                const response = await fetch('/api/get-recipes');
                const data = await response.json();
                
                const favoritesList = document.getElementById('favoritesList');
                
                if (data.recipes && data.recipes.length > 0) {
                    favoritesList.innerHTML = data.recipes.map(recipe => `
                        <div class="favorite-item" onclick="showRecipe(${recipe.id})">
                            <div class="favorite-title">${recipe.ingredients}</div>
                            <div class="favorite-date">${new Date(recipe.created_at).toLocaleDateString()}</div>
                        </div>
                    `).join('');
                } else {
                    favoritesList.innerHTML = '<p style="color: #6b7280;">No saved recipes yet. Generate and save your first recipe!</p>';
                }
            } catch (error) {
                console.error('Error loading favorites:', error);
            }
        }
        
        async function showRecipe(id) {
            try {
                const response = await fetch(`/api/get-recipe/${id}`);
                const data = await response.json();
                
                if (data.recipe) {
                    document.getElementById('ingredients').value = data.recipe.ingredients;
                    document.getElementById('recipeOutput').textContent = data.recipe.recipe_text;
                    document.getElementById('recipeOutput').classList.add('active');
                    currentRecipe = data.recipe.recipe_text;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            } catch (error) {
                alert('Error loading recipe: ' + error.message);
            }
        }
        
        // Load favorites on page load
        loadFavorites();
    </script>
</body>
</html>
